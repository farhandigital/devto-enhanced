name: Release Pipeline
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ── 1. Sanity / guard checks ────────────────────────────────────────────────
  # Fast, no dependency install. Fails early before any expensive work begins.
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.pkg.outputs.name }}
      version: ${{ steps.pkg.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.x"

      - name: Read name and version from package.json
        id: pkg
        run: bash .github/workflows/jobs-scripts/steps/pkg.sh

      - name: Check tag matches package.json version
        run: bash .github/workflows/jobs-scripts/checks/check-version.sh
        env:
          tag_version: ${{ github.ref_name }}
          package_version: ${{ steps.pkg.outputs.version }}

      - name: Check release notes file exists and is non-empty
        run: bash .github/workflows/jobs-scripts/checks/check-release.sh
        env:
          version: ${{ steps.pkg.outputs.version }}

  # ── 2. Build ─────────────────────────────────────────────────────────────────
  # Only runs when all preflight checks pass.
  build:
    name: Build artifacts
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.x"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Chrome artifact
        run: bun run build

      - name: Build Firefox artifact
        run: bun run build:firefox

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          # WXT default output paths; update glob if the output dir is customised.
          path: .output/${{ needs.preflight.outputs.name }}-${{ needs.preflight.outputs.version }}-*.zip
          if-no-files-found: error

  # ── 3. Release ───────────────────────────────────────────────────────────────
  # Only runs when the build succeeds. Full git history needed for the changelog.
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: [preflight, build]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history required for git-log changelog

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: .output/

      - name: Create release
        run: bash .github/workflows/jobs-scripts/steps/release.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          name: ${{ needs.preflight.outputs.name }}
          version: ${{ needs.preflight.outputs.version }}
